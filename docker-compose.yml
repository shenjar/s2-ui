---
services:
  s-ui:
    image: ghcr.io/shenaba/2s-ui
    container_name: s-ui
    hostname: "s-ui"
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
    tty: true
    restart: unless-stopped
    ports:
      - "2095:2095"
      - "2096:2096"
      # Uncomment the line below to enable automatic ACME (Let's Encrypt)
      # certificates. It binds host port 80, which must be free.
      # 取消下面这行注释以启用自动 ACME (Let's Encrypt) 证书申请。
      # 它会占用服务器的 80 端口，请确保该端口未被其他程序使用。
      # - "80:80"
    networks:
      - s-ui
    entrypoint: "./entrypoint.sh"

networks:
  s-ui:
    driver: bridge
